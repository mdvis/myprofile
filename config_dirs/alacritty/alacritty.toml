[general]
working_directory = "Code"

[font.normal]
family = "SMS"
style = "Regular"

[font]
size = 16.0

[terminal.shell]
program = "/opt/homebrew/bin/tmux"

[window]
opacity = 0.85
blur = true

[cursor.style]
shape = "Block"
blinking = "Always"

[selection]
save_to_clipboard = true

