[main]
# ========================
# 基础外观
# ========================
font=SauceCodePro Nerd Font Mono:size=16
font-size-adjustment=0.5
dpi-aware=yes

initial-window-size-pixels=900x600
pad=8x8 center

shell=/usr/bin/tmux

# ========================
# 光标
# ========================
[cursor]
style=beam
blink=yes
beam-thickness=1.5

# ========================
# 滚动
# ========================
[scrollback]
lines=5000
multiplier=3.0

# ========================
# 鼠标
# ========================
[mouse]
hide-when-typing=yes

# ========================
# 颜色（Catppuccin Mocha 风格，耐看不刺眼）
# ========================
[colors-dark]
background=1e1e2e
foreground=cdd6f4

regular0=45475a
regular1=f38ba8
regular2=a6e3a1
regular3=f9e2af
regular4=89b4fa
regular5=f5c2e7
regular6=94e2d5
regular7=bac2de

bright0=585b70
bright1=f38ba8
bright2=a6e3a1
bright3=f9e2af
bright4=89b4fa
bright5=f5c2e7
bright6=94e2d5
bright7=a6adc8

selection-foreground=1e1e2e
selection-background=f5e0dc

# ========================
# 快捷键（保留最常用）
# ========================
[key-bindings]
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v
font-increase=Control+equal
font-decrease=Control+minus
font-reset=Control+0
spawn-terminal=Control+Shift+n

# ========================
# URL（直接用浏览器打开）
# ========================
[url]
launch=xdg-open ${url}
