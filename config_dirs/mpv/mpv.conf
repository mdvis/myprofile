vo=gpu
gpu-api=auto
hwdec=auto
hwdec-codecs=all
volume=100
volume-max=100
alang=zh,en
slang=zh,en,chi
sub-auto=all
sub-font=Songti SC
sub-font-size=48
sub-color=1.0/1.0/1.0
sub-shadow-color=0/0/0/0.7
sub-shadow-offset=2
sub-margin-y=20
osd-level=1
osd-color=1.0/1.0/1.0
osd-shadow-color=0/0/0
osd-font=Songti SC
osd-font-size=36
cursor-autohide=no
osd-duration=2000
loop=no
shuffle=no
save-position-on-quit=yes
watch-later-options=start
hr-seek=yes
hr-seek-framedrop=no
video-sync=display-resample
interpolation=no
ytdl=yes
ytdl-format=bestvideo+bestaudio/best